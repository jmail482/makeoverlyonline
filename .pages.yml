# Pages CMS configuration for makeoverlyonline (Hugo)
# Docs: https://pagescms.org/docs  |  Connect at https://app.pagescms.org
# Repo: jmail482/makeoverlyonline  (branch: main)

media:
  input: static/images
  output: /images
  extensions: [jpg, jpeg, png, webp, svg, gif]

content:
  - name: case-studies
    label: Case Studies
    type: collection
    path: content/case-studies
    view:
      fields: [title, date, draft]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - { name: title, label: Title, type: string, required: true }
      - name: date
        label: Date
        type: date
        options: { time: true, format: "yyyy-MM-dd'T'HH:mm:ssxxx" }
      - { name: draft, label: Draft, type: boolean, default: false }
      - { name: description, label: Meta description, type: text }
      - { name: summary, label: Summary, type: text }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: categories, label: Categories, type: string, list: true }
      - { name: stat, label: "Stat (e.g. +104%)", type: string }
      - { name: statLabel, label: Stat label, type: string }
      - { name: statSubtitle, label: Stat subtitle, type: string }
      - name: cover
        label: Cover image
        type: object
        fields:
          - { name: image, label: Image, type: image, options: { path: static/images/case-studies } }
          - { name: alt, label: Alt text, type: string }
          - { name: caption, label: Caption, type: string }
      - { name: ShowToc, label: Show table of contents, type: boolean, default: true }
      - { name: TocOpen, label: TOC expanded by default, type: boolean, default: false }
      - { name: body, label: Body, type: rich-text }

  - name: blog
    label: Blog
    type: collection
    path: content/blog
    view:
      fields: [title, date, draft]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - { name: title, label: Title, type: string, required: true }
      - name: date
        label: Date
        type: date
        options: { time: true, format: "yyyy-MM-dd'T'HH:mm:ssxxx" }
      - { name: draft, label: Draft, type: boolean, default: false }
      - { name: description, label: Meta description, type: text }
      - { name: summary, label: Summary, type: text }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: categories, label: Categories, type: string, list: true }
      - { name: body, label: Body, type: rich-text }

  - name: pages
    label: Standalone Pages
    type: group
    items:
      - name: privacy
        label: Privacy Policy
        type: file
        path: content/privacy-policy.md
        fields: &legalfields
          - { name: title, label: Title, type: string, required: true }
          - { name: date, label: Date, type: date, options: { format: "yyyy-MM-dd" } }
          - { name: draft, label: Draft, type: boolean, default: false }
          - { name: url, label: URL override, type: string }
          - { name: ShowToc, label: Show table of contents, type: boolean, default: true }
          - { name: TocOpen, label: TOC expanded by default, type: boolean, default: true }
          - { name: tags, label: Tags, type: string, list: true }
          - { name: categories, label: Categories, type: string, list: true }
          - { name: body, label: Body, type: rich-text }
      - name: terms
        label: Terms of Service
        type: file
        path: content/terms-of-service.md
        fields: *legalfields
      - name: permissions
        label: Permissions
        type: file
        path: content/permissions.md
        fields: *legalfields

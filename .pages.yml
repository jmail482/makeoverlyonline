media:
  input: static/images
  output: /images
  extensions: [jpg, jpeg, png, webp, svg, gif]

content:
  # Home page + About / Contact / Featured Work / Deep Case Study / Experience
  # all render from hugo.yaml (theme config). Edit the text values here.
  - name: homepage
    label: Home & Site Content
    type: file
    path: hugo.yaml
    format: code

  - name: case-studies
    label: Case Studies
    type: collection
    path: content/case-studies
    view:
      fields: [title, date, draft]
      primary: title
    fields:
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm:ssxxx"
      - name: draft
        label: Draft
        type: boolean
        default: false
      - name: description
        label: Meta description
        type: text
      - name: summary
        label: Summary
        type: text
      - name: tags
        label: Tags
        type: string
        list: true
      - name: categories
        label: Categories
        type: string
        list: true
      - name: stat
        label: Stat
        type: string
      - name: statLabel
        label: Stat label
        type: string
      - name: statSubtitle
        label: Stat subtitle
        type: string
      - name: body
        label: Body
        type: rich-text

  - name: blog
    label: Blog
    type: collection
    path: content/blog
    view:
      fields: [title, date, draft]
      primary: title
    fields:
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm:ssxxx"
      - name: draft
        label: Draft
        type: boolean
        default: false
      - name: description
        label: Meta description
        type: text
      - name: summary
        label: Summary
        type: text
      - name: tags
        label: Tags
        type: string
        list: true
      - name: body
        label: Body
        type: rich-text

  - name: privacy
    label: Privacy Policy
    type: file
    path: content/privacy-policy.md
    fields:
      - name: title
        label: Title
        type: string
      - name: body
        label: Body
        type: rich-text

  - name: terms
    label: Terms of Service
    type: file
    path: content/terms-of-service.md
    fields:
      - name: title
        label: Title
        type: string
      - name: body
        label: Body
        type: rich-text

  - name: permissions
    label: Permissions
    type: file
    path: content/permissions.md
    fields:
      - name: title
        label: Title
        type: string
      - name: body
        label: Body
        type: rich-text

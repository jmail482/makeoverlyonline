# CloudCannon configuration — Hugo site (jmail482/makeoverlyonline)
# Docs: https://cloudcannon.com/documentation/
# This file is read by CloudCannon only; Hugo ignores it.

paths:
  static: static
  uploads: static/images

collection_groups:
  - heading: Content
    collections:
      - case_studies
      - blog
      - pages

collections_config:
  case_studies:
    path: content/case-studies
    name: Case Studies
    icon: article
    sort:
      key: date
      order: desc
    preview:
      text:
        - key: title
      subtext:
        - key: date
      image:
        - key: cover.image
    add_options:
      - name: New Case Study

  blog:
    path: content/blog
    name: Blog
    icon: rss_feed
    sort:
      key: date
      order: desc
    add_options:
      - name: New Blog Post

  pages:
    path: content
    name: Pages
    icon: wysiwyg
    filter:
      base: strict

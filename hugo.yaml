  # ============================================================
  # SECTION 4: DEEP CASE STUDY — 1-2 Detailed Walkthroughs
  # ============================================================
  # REQUIREMENT: Full problem statement + your specific role +
  #              decisions/tradeoffs made + failures + learnings +
  #              before/after metrics + visuals.
  #              Evidence of THINKING — why X over Y, constraints,
  #              what you'd do differently.
  # WHY: This is Tier 2 — what separates hires from the pile.
  #      Recruiters and hiring managers want to see HOW you think,
  #      not just what you delivered.
  # STATUS: ✅ TWAG deep dive (6-year retainer, full narrative)
  #         ✅ Excalibur deep dive (AI engine architecture)
  #         ✅ Metrics boxes for each
  #         ✅ Key decisions & tradeoffs listed
  #         ✅ "What I'd do differently" included
  #         ⬜ Could add before/after screenshots
  # ============================================================
  deepCaseStudy:
    enable: true
    title: "Deep Dive"
    subtitle: "Two engagements examined in detail — the thinking, the tradeoffs, and the numbers."
    items:
      - title: "TWAG: Six Years, 33 Cities, One Cloudflare Config Change"
        client: "Tetrault Wealth Advisory Group"
        duration: "Nov 2019 – Nov 2025"
        role: "SEO Lead (Retainer)"
        content: |-
          **The problem:** A wealth advisory firm with 33 advisor location pages across Canada, stuck at #6 on Wealth Professional Canada's Top-50 list. SEMrush keyword visibility plateaued despite consistent content production.

          **What I did:** Built and maintained a comprehensive SEO infrastructure: 33 location pages with advisor-specific schema, bi-weekly KPI reporting (138 reports total), continuous technical monitoring. The breakthrough came from a Cloudflare + Argo Smart Routing deployment — a CDN configuration change that most SEO consultants wouldn't think to test.

          **What I'd do differently:** I would have deployed Cloudflare earlier. The configuration change alone delivered the single largest measurable lift of the entire 6-year engagement. The lesson: infrastructure-level changes can outperform months of content work.
        metrics:
          - value: "#6 → #2"
            label: "WPC Top-50 Ranking"
          - value: "+104%"
            label: "Keyword Visibility"
          - value: "26% → 55%"
            label: "Top-100 URL Share"
          - value: "138"
            label: "KPI Reports"
        decisions:
          - "**Cloudflare over traditional CDN** — Argo Smart Routing's dynamic path optimization reduced TTFB across all 33 location pages simultaneously. SEMrush verified the lift."
          - "**Bi-weekly reporting cadence** — Not monthly. Bi-weekly reporting caught ranking drops within one cycle instead of two. 138 reports over 6 years."
          - "**Province-level location pages** — Built 33 pages (every Canadian province × advisor count) rather than a single national page. Each page schema-tagged to the specific advisor."
        link: "/makeoverlyonline/case-studies/twag-104-percent-lift/"

      - title: "Excalibur: Building an AI Marketing Engine That Cross-Checks Itself"
        client: "Internal Product"
        duration: "2024 – Present"
        role: "Architect & Developer"
        content: |-
          **The problem:** Single-LLM audits hallucinate. They fabricate metrics, miss critical technical issues, and produce confident-sounding nonsense. I needed an audit system where no single model's output goes unverified.

          **What I built:** Excalibur is a 14-module marketing audit engine that routes queries through multiple LLMs, cross-verifies findings, and produces 22-tab interactive HTML reports. Each module handles a different audit dimension — technical SEO, entity analysis, schema validation, competitor intelligence, content gaps, and more.

          **The catch it proved:** During a client audit (Sologlass.ca), Excalibur's multi-LLM verification caught a fabricated 5-star/500-review schema block that a single-pass audit would have missed entirely. The reviews didn't exist. The schema was injected. One model said it was fine. Two others flagged it.
        metrics:
          - value: "14"
            label: "Audit Modules"
          - value: "22"
            label: "Report Tabs"
          - value: "Multi-LLM"
            label: "Verification"
          - value: "3+"
            label: "Client Deployments"
        decisions:
          - "**Multi-LLM over single-LLM** — More expensive, slower, but the cross-verification catches fabrications that would otherwise reach the client as fact."
          - "**Interactive HTML over PDF** — Clients can click through 22 tabs, filter findings, and drill into evidence. Static PDFs bury the detail."
          - "**Evidence tagging** — Every finding tagged [OBS] observed, [INF] inferred, or [UNV] unverified. The client sees exactly how confident each claim is."
        link: "/makeoverlyonline/case-studies/excalibur-engine-development/"


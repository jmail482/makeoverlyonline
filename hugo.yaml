  # ============================================================
  # REQUIREMENT: Recruiter decides in 7.4 seconds. Visual impression in 0.05s.
  # MUST HAVE: Name + one-line value statement + 2-3 credibility stats
  #            Professional photo + Resume download + social links + CTA
  # WHY: 94% of recruiters consider portfolios important. 50% navigate
  #      to portfolio when link is included. First impression is everything.
  # STATUS: ✅ Photo, name, subtitle, content, social links, CTA button
  #         ✅ Stats bar (14 years, 138 reports, +104%, 4 clients)
  #         ✅ Resume download button
  #         ⬜ Need actual resume PDF at static/files/jonathan-nishikawa-resume.pdf
  # ============================================================

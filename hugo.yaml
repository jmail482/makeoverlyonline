  # ============================================================
  # SECTION 2: ABOUT — The Human Element
  # ============================================================
  # REQUIREMENT: 2-3 paragraphs telling a story, NOT rehashing the resume.
  #              What problems you solve, for whom. What you're building now.
  #              Skills listed by category — NO percentage bars.
  # WHY: Professional photo + human about section makes you easier to
  #      advocate for internally. Personality is a differentiator.
  # STATUS: ✅ Story-first copy (not resume recap)
  #         ✅ Photo
  #         ✅ Skills by category (no % bars)
  #         ✅ Mentions ZEUS AI + Excalibur (current work)
  # ============================================================
  about:
    enable: true
    title: "About Me"
    image: "/makeoverlyonline/images/profile.jpg"
    content: |-
      I've spent 14 years helping businesses get found — first through manual SEO audits and link building, now through AI-driven marketing engines that do in minutes what used to take weeks.

      My longest engagement was a six-year retainer with a Canadian wealth advisory firm. The anchor advisor went from #6 to #2 on Wealth Professional Canada's Top-50 list. I shipped 138 bi-weekly KPI reports. When the engagement ended, the systems I built were still running.

      Right now I'm building **Excalibur** — a 14-module multi-LLM audit system that cross-verifies findings across models and produces 22-tab interactive HTML reports. I'm also building **ZEUS AI**, an on-device AI companion running Gemma 3n with emotion-aware voice interaction and persistent memory.

      I work remotely from Winnipeg, MB. I solve problems that sit at the intersection of SEO, data engineering, and applied AI.
    skills:
      enable: true
      title: "What I work with:"
      items:
        - "Entity SEO & Knowledge Graph Optimization"
        - "Technical SEO at Scale"
        - "Local SEO & Multi-Location Strategy"
        - "AI Overview / SGE Readiness"
        - "PR-as-SEO Pipelines"
        - "Schema & Structured Data"
        - "Multi-LLM Marketing Engines"
        - "Python Automation & Programmatic SEO"
        - "Hugo / Static Site Architecture"
        - "Google Ads & Meta Ads"


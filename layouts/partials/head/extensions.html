<style>
/* Pure white background override */
body, body.light { background-color: #ffffff !important; }
section { background-color: #ffffff !important; }
.bg-transparent { background-color: transparent !important; }
.card { background-color: #ffffff !important; }
.deep-case-study { background: #f8f9fa !important; }
.testimonial-card { background: #f8f9fa !important; }
.dark body { background-color: #1a1a2e !important; }
.dark section { background-color: #1a1a2e !important; }
.dark .deep-case-study { background: rgba(255,255,255,0.03) !important; }
.dark .testimonial-card { background: rgba(255,255,255,0.03) !important; }

/* Fix opacity on hero subtitle — theme sets 0.5/0.6 which makes text look gray */
#hero h2 { opacity: 1 !important; }
#hero .subtitle { opacity: 1 !important; }
#hero .hero-content { opacity: 1 !important; }
.stat-label { opacity: 1 !important; }
.metric .metric-label { opacity: 1 !important; }

/* ALL BLACK TEXT — override theme CSS variables at :root level */
:root {
    --text-color: #000000 !important;
    --text-secondary-color: #000000 !important;
    --text-link-color: #000000 !important;
}
html, body, body.light {
    color: #000000 !important;
    --text-color: #000000 !important;
    --text-secondary-color: #000000 !important;
    --text-link-color: #000000 !important;
}

/* Direct element overrides — nuclear option */
h1, h2, h3, h4, h5, h6,
p, li, span, div, a, label, strong, em, b, i, blockquote,
.subtitle, .hero-content,
.section-heading, .section-subheading,
#primary-font, #primary-font *,
.card-body, .card-body *, .card-title, .card-text,
.nav-link, .navbar-text,
.deep-case-study, .deep-case-study *,
.testimonial-card, .testimonial-card *,
.hero-stat .stat-label,
.metric .metric-label,
.case-meta, .case-meta *,
.badge, .badge *,
footer, footer *,
.content *, .container * {
    color: #000000 !important;
}

/* Keep primary color ONLY for these accent elements */
.hero-stat .stat-number,
.metric .metric-value,
h1#primary-font, /* hero name */
#hero h1,
.testimonial-card .quote-mark {
    color: var(--primary-color, #007bff) !important;
}

/* Buttons keep their styling */
a.btn, a.btn-outline, .btn-outline {
    color: var(--primary-color, #007bff) !important;
    border-color: var(--primary-color, #007bff) !important;
}
a.btn:hover, a.btn-outline:hover, .btn-outline:hover {
    color: #ffffff !important;
    background-color: var(--primary-color, #007bff) !important;
}

/* Social icons keep blue */
.social-icons a, .social-icons a i, .social-icons a svg {
    color: var(--primary-color, #007bff) !important;
}

/* Read Case Study links keep blue */
.project-link a, a[href*="case-stud"] {
    color: var(--primary-color, #007bff) !important;
}

/* Nav brand keeps blue */
.navbar-brand, .navbar-brand * {
    color: var(--primary-color, #007bff) !important;
}
</style>
<script>
function scrollToSection(el) {
    var section = el.getAttribute('data-section');
    var target = document.getElementById(section);
    if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
        history.replaceState(null, '', el.getAttribute('href'));
        return false;
    }
    return true;
}

// On page load: force black text via JS (belt and suspenders) + handle section URLs
(function() {
    document.addEventListener('DOMContentLoaded', function() {
        // Force CSS variables to black
        document.documentElement.style.setProperty('--text-color', '#000000', 'important');
        document.documentElement.style.setProperty('--text-secondary-color', '#000000', 'important');
        document.documentElement.style.setProperty('--text-link-color', '#000000', 'important');

        // Handle section navigation from clean URLs
        var base = '/makeoverlyonline/';
        var path = window.location.pathname;
        if (path.indexOf(base) === 0) {
            var section = path.substring(base.length).replace(/\/$/, '');
            if (section && section !== '') {
                var target = document.getElementById(section);
                if (target) {
                    setTimeout(function() {
                        target.scrollIntoView({ behavior: 'smooth' });
                    }, 300);
                }
            }
        }
        // Handle hash
        if (window.location.hash) {
            var hash = window.location.hash.substring(1);
            var target = document.getElementById(hash);
            if (target) {
                history.replaceState(null, '', base + hash);
                setTimeout(function() {
                    target.scrollIntoView({ behavior: 'smooth' });
                }, 300);
            }
        }
    });
})();
</script>

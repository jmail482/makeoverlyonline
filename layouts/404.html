<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        (function() {
            var base = '/makeoverlyonline/';
            var path = window.location.pathname;
            var sections = ['about','experience','projects','deep-case-study','achievements','contact','testimonials','hero'];
            if (path.indexOf(base) === 0) {
                var segment = path.substring(base.length).replace(/\/$/, '');
                if (sections.indexOf(segment) !== -1) {
                    window.location.replace(base + '#' + segment);
                    return;
                }
            }
            window.location.replace(base);
        })();
    </script>
</head>
<body><p>Redirecting...</p></body>
</html>

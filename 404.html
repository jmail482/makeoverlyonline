<!DOCTYPE html>
<html>
<head><script src="/makeoverlyonline/livereload.js?mindelay=10&amp;v=2&amp;port=1313&amp;path=makeoverlyonline/livereload" data-no-instant defer></script>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        (function() {
            var base = '/makeoverlyonline/';
            var map = {
                'about': 'about/',
                'experience': 'experience/',
                'projects': 'featured-work/',
                'featured-work': 'featured-work/',
                'deep-case-study': 'deep-case-study/',
                'contact': 'contact/'
            };
            var path = window.location.pathname;
            var hash = (window.location.hash || '').replace('#', '');
            if (hash && map[hash]) { window.location.replace(base + map[hash]); return; }
            if (path.indexOf(base) === 0) {
                var seg = path.substring(base.length).replace(/\/$/, '');
                if (map[seg]) { window.location.replace(base + map[seg]); return; }
            }
            window.location.replace(base);
        })();
    </script>
</head>
<body><p>Redirecting...</p></body>
</html>
